# Keeps GitHub Pages in lockstep with main by mirroring main into the
# gh-pages branch on every push. Pages serves the gh-pages branch (the branch
# was first pushed manually, which auto-enables Pages on user repos — the
# Pages REST API is not callable with the workflow token, so branch mode it is).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # .nojekyll: serve files verbatim, skip the Jekyll build
          touch .nojekyll
          git add .nojekyll
          git -c commit.gpgsign=false commit -m "pages: mirror of main @ ${GITHUB_SHA}" --allow-empty
          git push --force origin HEAD:gh-pages
